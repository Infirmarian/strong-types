name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check code formatting
        run: |
          find include test -name '*.cpp' -o -name '*.hpp' | xargs clang-format --dry-run --Werror

      - name: Configure CMake
        run: |
          cmake --preset ci

      - name: Build
        run: |
          cmake --build --preset ci

      - name: Run tests
        run: |
          ctest --test-dir build --output-on-failure
